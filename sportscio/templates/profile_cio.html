<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Profile | SportsCIO</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .page {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px 40px;
        }

        .header {
            background: linear-gradient(135deg, #1e3a5f, #2f5a8a);
            color: white;
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 10px 28px rgba(30, 58, 95, 0.22);
            margin-bottom: 28px;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 2.3rem;
        }

        .header p {
            margin: 6px 0 0 0;
            font-size: 1rem;
            opacity: 0.95;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 16px;
            color: #1e3a5f;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .info-item {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
        }

        .info-item .label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #6b7280;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .info-item .value {
            font-size: 1.05rem;
            color: #111827;
            word-break: break-word;
        }

        .app-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .app-list li {
            padding: 14px 16px;
            margin-bottom: 12px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="page">
    <div class="header">
        <h1>CIO Executive Profile</h1>
        <p>Review executive-level information and manage club operations.</p>
    </div>

    <div class="card">
        <h2>Account Information</h2>
        <div class="info-grid">
            <div class="info-item">
                <div class="label">Username</div>
                <div class="value">{{ request.user.username }}</div>
            </div>
            <div class="info-item">
                <div class="label">Type</div>
                <div class="value">{{ request.user.profile.user_type }}</div>
            </div>
            <div class="info-item">
                <div class="label">Email</div>
                <div class="value">{{ request.user.email }}</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Applications</h2>
        <ul class="app-list">
            {% for app in applications %}
            <li>{{ app }}</li>
            {% endfor %}
        </ul>
    </div>
</div>

</body>
</html>
