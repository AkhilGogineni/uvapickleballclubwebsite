{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SportsCIO</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eaf1f8 0%, #f7f9fc 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f2937;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            background: white;
            padding: 36px 32px;
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        .login-box h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            color: #1e3a5f;
        }

        .login-box p {
            margin: 0 0 28px 0;
            color: #6b7280;
            font-size: 0.98rem;
            line-height: 1.5;
        }

        .google-btn {
            display: inline-block;
            width: 100%;
            padding: 14px 18px;
            background: #1e3a5f;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .google-btn:hover {
            background: #2f5a8a;
            transform: translateY(-1px);
        }

        .brand {
            margin-bottom: 18px;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #7c8aa0;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="brand">SportsCIO</div>
    <h1>Welcome Back</h1>
    <p>Sign in with your Google account to access your club dashboard.</p>
    <a class="google-btn" href="{% provider_login_url 'google' %}">Sign in with Google</a>
</div>

</body>
</html>
